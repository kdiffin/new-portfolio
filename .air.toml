root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/web"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "tmpl", "html", "css", "js", "json"]
  exclude_dir = ["tmp", "node_modules", ".git"]
  exclude_regex = ["_test\\.go"]
  delay = 200
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
